<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200&amp;display=swap');
      .text-echo {
        font-family: 'Inter', sans-serif;
        font-weight: 200;
        letter-spacing: 0.5em;
        text-transform: lowercase;
      }
      .text-tagline {
        font-family: 'Inter', sans-serif;
        font-weight: 200;
        letter-spacing: 0.4em;
        text-transform: uppercase;
      }
    </style>
  </defs>
  
  <!-- Icon Part -->
  <g transform="translate(40, 60) scale(0.8)">
    <circle cx="50" cy="50" r="8" fill="#88c0d0"/>
    <g fill="#88c0d0">
        <circle cx="50" cy="25" r="2.5" opacity="0.6"/>
        <circle cx="75" cy="50" r="2.5" opacity="0.6"/>
        <circle cx="50" cy="75" r="2.5" opacity="0.6"/>
        <circle cx="25" cy="50" r="2.5" opacity="0.6"/>
        <circle cx="67.7" cy="32.3" r="1.5" opacity="0.3"/>
        <circle cx="67.7" cy="67.7" r="1.5" opacity="0.3"/>
        <circle cx="32.3" cy="67.7" r="1.5" opacity="0.3"/>
        <circle cx="32.3" cy="32.3" r="1.5" opacity="0.3"/>
    </g>
    <circle cx="50" cy="50" r="35" stroke="#88c0d0" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- Text Part -->
  <text x="160" y="102" class="text-echo" font-size="64" fill="#88c0d0">
    echo
  </text>
  
  <text x="160" y="138" class="text-tagline" font-size="14" fill="#616e88">
    The shell's reflection
  </text>
  
  <rect x="160" y="152" width="240" height="1" fill="#88c0d0" opacity="0.2"/>
</svg>
